<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#173A7A" />

    <!--
      Content-Security-Policy. GitHub Pages can't set response headers, so the
      policy is expressed as a meta tag (the supported mechanism for a static
      host). It is intentionally strict but allows exactly what the app needs:
        - default 'self' only — no third-party origins on initial load.
        - script: 'self' + 'wasm-unsafe-eval' (Pyodide compiles WebAssembly) +
          jsdelivr, which is where Pyodide's runtime is fetched from on demand
          (image→file conversion). No 'unsafe-inline' — the build emits no inline
          scripts, and Pyodide injects an external script from the CDN above.
        - style-src keeps 'unsafe-inline' for Konva/React inline styles.
        - connect/worker/img allow blob: and data: for canvas, web workers, and
          in-browser file exports, plus jsdelivr for Pyodide assets.
      No user content is ever uploaded — these origins serve runtime code only.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; connect-src 'self' data: blob: https://cdn.jsdelivr.net; worker-src 'self' blob:; manifest-src 'self'"
    />
    <meta name="referrer" content="no-referrer" />
    <meta
      name="description"
      content="Buttery Stitches — a free, fully client-side machine-embroidery digitizer. Your images never leave your machine."
    />
    <title>Buttery Stitches — Free Embroidery Digitizer</title>

    <!-- Social share card -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Buttery Stitches" />
    <meta property="og:title" content="Buttery Stitches — Free Embroidery Digitizer" />
    <meta
      property="og:description"
      content="Turn pictures, words, and shapes into machine-ready embroidery files — free, open-source, and entirely in your browser. Nothing is ever uploaded."
    />
    <meta property="og:url" content="https://buttery-stitches.suzie.fun/" />
    <meta property="og:image" content="https://buttery-stitches.suzie.fun/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Buttery Stitches — Free Embroidery Digitizer" />
    <meta
      name="twitter:description"
      content="Turn pictures, words, and shapes into machine-ready embroidery — free, open-source, all in your browser."
    />
    <meta name="twitter:image" content="https://buttery-stitches.suzie.fun/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
