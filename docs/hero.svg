<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <style>
      .navy{fill:#16234A}.butter{fill:#F9E9A6}.b100{fill:#FCF4D0}.cream{fill:#FFFDF3}
      .b200{fill:#F4DC79}.ink{fill:#16234A}.dim{fill:#6b6b7a}
      .tick{stroke:#16234A;stroke-width:1}
    </style>
  </defs>

  <!-- app frame -->
  <rect width="1200" height="720" class="cream"/>
  <rect width="1200" height="720" fill="none" stroke="#e4dcc0" stroke-width="2"/>

  <!-- top bar -->
  <rect width="1200" height="52" class="navy"/>
  <text x="24" y="34" fill="#F9E9A6" font-size="22" font-weight="bold">🧈 Buttery Stitches</text>
  <g fill="#FCF4D0" font-size="14">
    <text x="250" y="33">New</text><text x="305" y="33">Open</text><text x="365" y="33">Save</text>
    <text x="430" y="33">Import image</text><text x="545" y="33">Export ▾</text><text x="630" y="33">Worksheet</text>
  </g>
  <circle cx="1170" cy="26" r="11" fill="none" stroke="#F4DC79"/>
  <text x="1166" y="31" fill="#FCF4D0" font-size="13">?</text>

  <!-- left layer panel -->
  <rect x="0" y="52" width="210" height="610" class="b100"/>
  <text x="16" y="80" class="ink" font-size="15" font-weight="bold">Stitch Order</text>
  <g font-size="13">
    <rect x="8" y="92" width="194" height="30" rx="4" class="b200"/>
    <rect x="16" y="100" width="14" height="14" rx="3" fill="#c8141e"/><text x="38" y="111" class="ink">Outline</text><text x="150" y="111" class="dim" font-size="10">FILL</text>
    <rect x="16" y="132" width="14" height="14" rx="3" fill="#16234A"/><text x="38" y="143" class="ink">Lettering</text><text x="140" y="143" class="dim" font-size="10">SATIN</text>
    <rect x="16" y="164" width="14" height="14" rx="3" fill="#e0a93b"/><text x="38" y="175" class="ink">Accent</text><text x="150" y="175" class="dim" font-size="10">FILL</text>
    <rect x="16" y="196" width="14" height="14" rx="3" fill="#2c8a4a"/><text x="38" y="207" class="ink">Stem</text><text x="135" y="207" class="dim" font-size="10">RUNNING</text>
  </g>

  <!-- right panel -->
  <rect x="970" y="52" width="230" height="610" class="b100"/>
  <text x="986" y="80" class="ink" font-size="15" font-weight="bold">Design</text>
  <g font-size="12" class="dim">
    <text x="986" y="104">Hoop</text>
  </g>
  <rect x="986" y="110" width="198" height="26" rx="4" fill="#fff" stroke="#cdbf8f"/>
  <text x="994" y="127" class="ink" font-size="12">130×180 (5×7")</text>
  <g font-size="12" class="dim"><text x="986" y="158">Width (mm)</text><text x="1090" y="158">Height (mm)</text></g>
  <rect x="986" y="164" width="92" height="26" rx="4" fill="#fff" stroke="#cdbf8f"/><text x="994" y="181" class="ink" font-size="12">96.0</text>
  <rect x="1092" y="164" width="92" height="26" rx="4" fill="#fff" stroke="#cdbf8f"/><text x="1100" y="181" class="ink" font-size="12">72.0</text>
  <rect x="986" y="200" width="198" height="26" rx="4" class="navy"/><text x="1042" y="217" fill="#F4DC79" font-size="12">Fit to hoop</text>
  <text x="986" y="252" class="ink" font-size="13" font-weight="bold">Properties</text>
  <g font-size="12" class="dim"><text x="986" y="276">Stitch type · Satin</text><text x="986" y="298">Density 0.40 mm</text><text x="986" y="320">Column width 3.5 mm</text></g>
  <rect x="986" y="334" width="198" height="24" rx="4" class="b200"/><text x="994" y="350" class="ink" font-size="12">Stitches 1,284</text>

  <!-- rulers -->
  <rect x="210" y="52" width="760" height="22" class="butter"/>
  <rect x="210" y="74" width="22" height="566" class="butter"/>
  <rect x="210" y="52" width="22" height="22" fill="#EBCB4E"/>
  <g class="tick">
    <line x1="270" y1="74" x2="270" y2="64"/><line x1="330" y1="74" x2="330" y2="62"/>
    <line x1="390" y1="74" x2="390" y2="64"/><line x1="450" y1="74" x2="450" y2="62"/>
    <line x1="510" y1="74" x2="510" y2="64"/><line x1="570" y1="74" x2="570" y2="62"/>
    <line x1="630" y1="74" x2="630" y2="64"/><line x1="690" y1="74" x2="690" y2="62"/>
    <line x1="750" y1="74" x2="750" y2="64"/><line x1="810" y1="74" x2="810" y2="62"/>
    <line x1="232" y1="140" x2="242" y2="140"/><line x1="232" y1="200" x2="244" y2="200"/>
    <line x1="232" y1="260" x2="242" y2="260"/><line x1="232" y1="320" x2="244" y2="320"/>
    <line x1="232" y1="380" x2="242" y2="380"/><line x1="232" y1="440" x2="244" y2="440"/>
    <line x1="232" y1="500" x2="242" y2="500"/><line x1="232" y1="560" x2="244" y2="560"/>
  </g>

  <!-- canvas + hoop -->
  <rect x="232" y="74" width="738" height="566" class="cream"/>
  <rect x="300" y="120" width="600" height="470" fill="#ffffff" stroke="#27386E" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- a little stitched motif (tulip) -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- stem (running) -->
    <path d="M600 470 L600 360" stroke="#2c8a4a" stroke-width="3" stroke-dasharray="7 4"/>
    <!-- leaves (fill lines) -->
    <path d="M600 420 q-50 -10 -78 -44 q44 -6 78 24 z" fill="#2c8a4a" opacity="0.85"/>
    <path d="M600 400 q50 -10 78 -44 q-44 -6 -78 24 z" fill="#2c8a4a" opacity="0.85"/>
    <!-- petals (satin columns) -->
    <path d="M540 360 q10 -90 60 -110 q-6 70 -22 110 z" fill="#c8141e"/>
    <path d="M660 360 q-10 -90 -60 -110 q6 70 22 110 z" fill="#e0a93b"/>
    <path d="M560 360 q40 -60 80 0 q-40 26 -80 0 z" fill="#16234A"/>
    <!-- satin texture lines on the navy petal -->
    <g stroke="#FFFDF3" stroke-width="1" opacity="0.5">
      <line x1="566" y1="352" x2="568" y2="336"/><line x1="582" y1="358" x2="586" y2="334"/>
      <line x1="600" y1="360" x2="600" y2="332"/><line x1="618" y1="358" x2="614" y2="334"/>
      <line x1="634" y1="352" x2="632" y2="336"/>
    </g>
  </g>

  <!-- needle marker -->
  <circle cx="600" cy="360" r="5" fill="#FFFDF3" stroke="#16234A" stroke-width="1.5"/>

  <!-- simulator bar -->
  <rect x="210" y="640" width="760" height="22" class="b100"/>
  <rect x="218" y="644" width="48" height="14" rx="3" class="navy"/><text x="226" y="655" fill="#F4DC79" font-size="10">Stitch</text>
  <rect x="270" y="644" width="40" height="14" rx="3" fill="#FFFDF3" stroke="#cdbf8f"/><text x="280" y="655" class="ink" font-size="10">Edit</text>
  <polygon points="326,645 326,657 336,651" fill="#16234A"/>
  <line x1="350" y1="651" x2="900" y2="651" stroke="#cdbf8f" stroke-width="3"/>
  <circle cx="690" cy="651" r="5" class="navy"/>
  <text x="912" y="655" class="dim" font-size="10">812 / 1,284</text>
</svg>
