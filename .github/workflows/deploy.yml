name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel older in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      # GitHub Pages intermittently rejects or strands deployments ("Deployment
      # failed, try again later" / stuck at deployment_queued), which leaves the
      # live site stale until the next merge. Retry once after a pause before
      # calling the run failed.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before retrying a flaky Pages deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 120
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
