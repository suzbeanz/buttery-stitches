name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Browser binary + OS deps (not available in the dev sandbox; CI fetches it).
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Lighthouse over the static build. Assertions are warn-level guardrails
      # (see lighthouserc.json) so scores are reported on every PR without
      # blocking; promote categories to "error" once baselines are confirmed.
      - run: npx --yes @lhci/cli@0.14.x autorun

  # Native PES/DST writers vs the pyembroidery reference (Pyodide in node).
  # This is the real oracle that pins the encoders to the reference library;
  # previously it only ran when someone remembered to invoke it locally, so
  # encoder drift could land unnoticed. Runs on main pushes (not every PR —
  # it downloads wheels from PyPI and takes a couple of minutes).
  oracle:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Each oracle is TWO stages: the .ts half (vite-node — pyodide can't
      # resolve under it) emits our encoder's bytes to /tmp, then the .mjs half
      # (plain node + Pyodide) generates pyembroidery's and compares.
      - run: npx vite-node scripts/oracle-pes.ts
      - run: node scripts/oracle-pes.mjs
      - run: npx vite-node scripts/oracle-dst.ts
      - run: node scripts/oracle-dst.mjs
